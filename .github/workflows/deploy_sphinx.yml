name: Deploy Sphinx docs to GitHub Pages

# Builds the MyST/Sphinx documentation site in docs/ and publishes it to the
# gh-pages branch root. Supersedes the goxygen-based deploy_docs.yml.

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy_sphinx.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build HTML
        run: sphinx-build -b html docs docs/_build/html

      - name: Disable Jekyll
        run: touch docs/_build/html/.nojekyll

      - name: Deploy to GitHub Pages (root of gh-pages)
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./docs/_build/html
          enable_jekyll: false
